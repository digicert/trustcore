name: "NanoCert EST TAP LOCAL Integration Tests"

on:
  workflow_dispatch: {}
  schedule:
    - cron: '30 12 * * 3'   # Wednesday 6:00 PM IST
    - cron: '30 12 * * 5'   # Friday 6:00 PM IST

jobs:
  nanocert-est-tap-local-integration-tests:
    runs-on: ubuntu-22.04

    steps:
      - name: Clone mocn-qa-m-products
        env:
          MY_SECRET_TOKEN: ${{ secrets.MY_SECRET_TOKEN }}
        run: |
          git clone https://${MY_SECRET_TOKEN}@github.com/digicert/mocn-qa-m-products.git ~/mocn-qa-m-products
          cd ~/mocn-qa-m-products

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake python3-pip valgrind expect
          cmake --version
          pip3 install --upgrade pip
          pip3 install psutil
          pip3 install tls-client
          pip3 install typing_extensions
          pip3 install pexpect
          sudo apt-get install -y lcov
          sudo apt-get update
          sudo apt-get install -y unzip
          sudo apt install -y dh-autoreconf libssl-dev libtasn1-6-dev pkg-config libtpms-dev net-tools iproute2 libjson-glib-dev libgnutls28-dev expect gawk socat libseccomp-dev libfuse3-dev build-essential automake autoconf libtool git
          lcov --version
          valgrind --version
          expect -v

      - name: Clone the libtpms and swtpm repositories
        run: |
          git clone https://github.com/stefanberger/libtpms.git
          git clone https://github.com/stefanberger/swtpm.git

      - name: Setup /etc/digicert folder
        run: |
          sudo mkdir -p /etc/digicert/
          sudo chown -R $USER:$USER /etc/digicert/
          sudo chmod 777 /etc/digicert/

      - name: Build libtpms
        run: |
          pushd libtpms
          ./autogen.sh --with-openssl --with-tpm2 --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          popd

      - name: Build swtpm
        run: |
          pushd swtpm
          ./autogen.sh --with-openssl --with-cuse --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          popd

      - name: Run swtpm (to create /dev/tpm0)
        run: |
          sudo LD_LIBRARY_PATH=/usr/local/lib swtpm cuse -n tpm0 --tpm2 --tpmstate dir=$HOME/tpm-state --flags startup-clear --log file=/tmp/swtpm.log &

      - name: Verify TPM device creation
        run: |
          ls -l /dev/tpm0

      - name: Clone TrustEdge and provision TPM2
        run: |
          sudo useradd -MU trustedge || true
          git clone https://github.com/digicert/trustedge.git
          cd trustedge/tools/SecureElement
          ls -l tpm2_tools-x86_64-24.7.2-3262.zip
          unzip -o tpm2_tools-x86_64-24.7.2-3262.zip
          unzip tpm2_tools-x86_64.zip
          chmod +x provision_tpm2.sh
          sudo ./provision_tpm2.sh

      - name: Check DigiCert TPM files
        run: |
          DIR="/etc/digicert/"
          echo "Checking files in $DIR..."

          if [ -f "$DIR/tpm2.conf" ]; then
            echo "✅ tpm2.conf exists"
          else
            echo "❌ tpm2.conf NOT found"
          fi

          if [ -f "$DIR/creds.tpm2" ]; then
            echo "✅ creds.tpm2 exists"
          else
            echo "❌ creds.tpm2 NOT found"
          fi

      - name: Prepare thirdparty_app directory
        run: |
          mkdir -p ~/thirdparty_app

      - name: Install OpenSSL 3.0.7
        run: |
          cd ~/thirdparty_app
          wget https://www.openssl.org/source/openssl-3.0.7.tar.gz
          tar -xf openssl-3.0.7.tar.gz
          cd openssl-3.0.7
          ./config
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Copy EST Test Files
        run: |
          cp -r ~/mocn-qa-m-products/estc_test/test_opensource/* .

      - name: Run NanoCert EST + TLS Integration Test
        env:
          CM_ENV_CODE_COVERAGE: 1
          DEVICETRUST_DEMO_CRED: ${{ secrets.DEVICETRUST_DEMO_CRED }}
        run: |
          sudo cp /etc/digicert/tpm2.conf keystore/
          sudo cp /etc/digicert/creds.tpm2 keystore/

          PYTHONUNBUFFERED=1 python3 est_sample.py build_client_cap_tap_local.json

      - name: Baseline Coverage
        run: |
          lcov --no-external --capture --initial --directory . --output-file /tmp/est_base.info

      - name: Capture Coverage
        run: |
          lcov --no-external --capture --directory . --output-file /tmp/est_test.info
          lcov --ignore-errors inconsistent --add-tracefile /tmp/est_base.info --add-tracefile /tmp/est_test.info --output-file /tmp/est_total.info

      - name: Print Coverage Summary
        run: |
          echo "Coverage Summary:"
          lcov --extract /tmp/est_total.info '*/est/*' --output-file /tmp/est_filtered.info
          lcov --list /tmp/est_filtered.info | tee coverage_summary.log

      - name: Upload Coverage Summary Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nanocert_est_tap_local_integration_test_coverage_summary
          path: coverage_summary.log
          retention-days: 5

      - name: Upload Valgrind Report Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: report_valgrind_client
          path: report_valgrind_client.zip
          retention-days: 5

      - name: Cleanup mocn-qa-m-products
        run: |
          rm -rf ~/mocn-qa-m-products
      
      - name: Get Slack User ID
        if: always()
        id: slack_map
        run: |
          GITHUB_USER="${{ github.actor }}"
          SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
          
          SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
          
          echo "GitHub User: $GITHUB_USER"
          echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT
  
      - name: Send Slack notification (Failure)
        if: always() && (failure() || cancelled())
        run: |
          SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
          if [ -n "$SLACK_USER_ID" ]; then
            MENTION="<@$SLACK_USER_ID>"
          else
            MENTION="${GITHUB_ACTOR}"
          fi
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            MESSAGE="NanoCert EST Integration Test failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            MESSAGE="NanoCert EST Integration Test failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi  
          curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
