name: "Build_NanoRoot"

on:
  workflow_dispatch: {}
  schedule:
    - cron: '15 4 * * *'

permissions:
  contents: read

jobs:
  build-nanoroot:
    runs-on: ubuntu-22.04

    steps:

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake
          cmake --version

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # ---------------- NANOROOT BUILDS ----------------

      - name: CMAKE Build with NanoCrypto and NanoTAP Local
        id: nanoroot_1
        continue-on-error: true
        run: |
          rm -rf build lib/* samples/bin/*
          cmake -DENABLE_NANOROOT=ON -DBUILD_SAMPLES=ON -DCM_ENABLE_RSA_8K=ON -DCM_ENABLE_TAP=ON -DCM_ENABLE_TAP_LOCAL=ON -B build -S .
          cmake --build build
          test -f samples/bin/tap_nanoroot_example

      # ---------------- FINAL FAILURE CHECK ----------------

      - name: Fail job if any build failed
        if: always()
        run: |
          FAILED=0

          if [[ "${{ steps.nanoroot_1.outcome }}" == "failure" ]]; then
            echo "❌ CMAKE Build with NanoCrypto and NanoTAP Local FAILED"
            FAILED=1
          fi

          if [[ $FAILED -eq 1 ]]; then
            echo ""
            echo "One or more builds failed."
            exit 1
          else
            echo ""
            echo "All builds passed."
          fi
          
      - name: Get Slack User ID
        if: always()
        id: slack_map
        run: |
          GITHUB_USER="${{ github.actor }}"
          SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
          
          SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
          
          echo "GitHub User: $GITHUB_USER"
          echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT

      - name: Send Slack notification (Failure)
        if: always() && (failure() || cancelled())
        run: |
          SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
          if [ -n "$SLACK_USER_ID" ]; then
            MENTION="<@$SLACK_USER_ID>"
          else
            MENTION="${GITHUB_ACTOR}"
          fi
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            MESSAGE="Build NanoRoot failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            MESSAGE="Build NanoRoot failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi  
          curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}



