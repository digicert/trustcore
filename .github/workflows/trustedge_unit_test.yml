name: TrustEdgev2 Unit Tests
permissions:
  contents: read
on:
  workflow_dispatch: {}
  push:
    paths:
      - .github/workflows/trustedge_unit_test.yml

env:
  NEXUS_CMAKE_REPO_URL: https://repo.dev.blu.digicert.com/repository/digicert-artifacts/dependencies/cmake/cmake-3.22.1/cmake-3.22.1-linux-x86_64.sh
  NEXUS_JANSSON_URL: https://repo.dev.blu.digicert.com/repository/digicert-artifacts/dependencies/jansson/2.13/jansson-2.13.tar.bz2

jobs:
  TrustEdge_v2:
    runs-on: [digicert-large]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Generate TrustEdge version number
        id: trustedge-client-version
        uses: paulhatch/semantic-version@a8f8f59fd7f0625188492e945240f12d7ad2dca3
        with:
          version_format: "${major}.${minor}.${patch}-${increment}"
          tag_prefix: "trustedge_"
          branch: main
          search_commit_body: true

      - name: Install dependencies
        run: |
          curl -u ${{ secrets.DEV_REPO_USERNAME }}:${{ secrets.DEV_REPO_PASSWORD }} ${{ env.NEXUS_CMAKE_REPO_URL }} -O -v
          export CMAKE_DIR=/opt/cmake
          sudo mkdir $CMAKE_DIR
          sudo bash cmake-3.22.1-linux-x86_64.sh --skip-license --prefix=$CMAKE_DIR
          export CMAKE_DIR=/opt/cmake
          export PATH=$CMAKE_DIR/bin:$PATH
          cmake --version
          curl -u ${{ secrets.DEV_REPO_USERNAME }}:${{ secrets.DEV_REPO_PASSWORD }} ${{ env.NEXUS_JANSSON_URL }} -O -v
          bunzip2 -c jansson-2.13.tar.bz2 | tar xf -
          cd jansson-2.13
          ./configure
          make
          sudo make install

      - name: Install lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          lcov --version

      - name: Build and Run TrustEdge v2 Unit Tests with Coverage Enabled
        run: |
          export CMAKE_DIR=/opt/cmake
          export PATH=$CMAKE_DIR/bin:$PATH
          ./scripts/ci/trustedge/ci_trustedge_build.sh --monolithic --gdb --version-string ${{ steps.trustedge-client-version.outputs.version }} --unittest --enable-coverage --proxy --pqc --pqc-composite --enable-pc
          cat ./projects/trustedge/build/Testing/Temporary/LastTest.log

      - name: Baseline Coverage
        run: |
          lcov --no-external --capture --initial --directory . --output-file /tmp/trustedge_base.info

      - name: Capture Coverage
        run: |
          lcov --no-external --capture --directory . --output-file /tmp/trustedge_test.info
          lcov --add-tracefile /tmp/trustedge_base.info --add-tracefile /tmp/trustedge_test.info --output-file /tmp/trustedge_total.info

      - name: Print Coverage Summary
        run: |
          echo "Coverage Summary:"
          lcov --list /tmp/trustedge_total.info
          
      - name: Get Slack User ID
        if: always()
        id: slack_map
        run: |
          GITHUB_USER="${{ github.actor }}"
          SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
          
          SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
          
          echo "GitHub User: $GITHUB_USER"
          echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT

      - name: Send Slack notification (Failure)
        if: always() && (failure() || cancelled()) 
        run: |
          SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
          if [ -n "$SLACK_USER_ID" ]; then
            MENTION="<@$SLACK_USER_ID>"
          else
            MENTION="${GITHUB_ACTOR}"
          fi
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            MESSAGE="TrustEdge Unittest failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            MESSAGE="TrustEdge Unittest failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi  
          curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
