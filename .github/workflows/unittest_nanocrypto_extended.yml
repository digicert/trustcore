name: "Unit Test NanoCrypto Extended"

on:
  workflow_dispatch: {}

  schedule:
    - cron: '30 9 * * 1'   # Monday 3:00 PM IST
    - cron: '30 9 * * 3'   # Wednesday 3:00 PM IST

jobs:
  unittest-nanocrypto-extended:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout current repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y cproto
        sudo apt install -y ruby
        sudo apt install -y build-essential
        sudo apt install -y cmake
        sudo apt install -y python3 python3-pip

    - name: Running Unittest NanoCrypto Extended
      run: |
        cd projects/crypto_unittest
        ./build.sh
        ./run.sh
        
    - name: Get Slack User ID
      if: always()
      id: slack_map
      run: |
        GITHUB_USER="${{ github.actor }}"
        SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
        
        SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
        
        echo "GitHub User: $GITHUB_USER"
        echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT

    - name: Send Slack notification (Failure)
      if: always() && (failure() || cancelled())
      run: |
        SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
        if [ -n "$SLACK_USER_ID" ]; then
          MENTION="<@$SLACK_USER_ID>"
        else
          MENTION="${GITHUB_ACTOR}"
        fi
        if [ "$GITHUB_REF_NAME" = "main" ]; then
          MESSAGE="Unittest NanoCrypto Extended Test failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        else
          MESSAGE="Unittest NanoCrypto Extended Test failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        fi  
        curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
