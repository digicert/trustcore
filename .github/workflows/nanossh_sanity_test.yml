name: "NanoSSH Sanity Tests"

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
  pull_request:
    paths:
      - .github/workflows/nanossh_sanity_test.yml
      - samples/ssh_client/**
      - samples/ssh_server/**
      - src/common/**
      - src/ssh/**
      - projects/nanossh/**
      - projects/nanossh_testunit/**
      - scripts/sanity_tests.sh

jobs:
  sanity-tests:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake python3 xxd sshpass

    - name: Run Sanity Tests
      run: |
        ./scripts/sanity_tests.sh
        
    - name: Get Slack User ID
      if: always()
      id: slack_map
      run: |
        GITHUB_USER="${{ github.actor }}"
        SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
        
        SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
        
        echo "GitHub User: $GITHUB_USER"
        echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT

    - name: Send Slack notification (Failure)
      if: always() && (failure() || cancelled())
      run: |
        SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
        if [ -n "$SLACK_USER_ID" ]; then
          MENTION="<@$SLACK_USER_ID>"
        else
          MENTION="${GITHUB_ACTOR}"
        fi
        if [ "$GITHUB_REF_NAME" = "main" ]; then
          MESSAGE="NanoSSH Sanity Test failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        else
          MESSAGE="NanoSSH Sanity Test failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        fi  
        curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
