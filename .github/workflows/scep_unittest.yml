name: SCEP Unit Tests

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - projects/scep/**
      - projects/nanocert/**
      - projects/cert_enroll/**
      - src/scep/**
      - src/cmc/**
      - src/common/**
      - src/asn1/**
      - src/crypto/**
      - src/cert_enroll/**

permissions:
  contents: read

jobs:
  UnitTest:
    runs-on: [ubuntu-22.04]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: trustcore-test

      - name: Install dependencies
        run: |
          cd trustcore-test
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get -y install lcov libcmocka-dev cmake
          lcov --version
          cmake --version

      - name: Build and Run Unit Tests
        run: |
          cd trustcore-test
          export CMAKE_DIR=/opt/cmake
          export PATH=$CMAKE_DIR/bin:$PATH
          cmake -DCMAKE_BUILD_TYPE=Debug -DENABLE_SCEP=ON -DENABLE_TPM2=ON -DENABLE_SCEP_UNITTEST=ON -B build -S .
          cmake --build build
          ./projects/scep_testunit/run.sh

      - name: Baseline Coverage
        run: |
          cd trustcore-test
          lcov --no-external --capture --initial --directory . --output-file /tmp/scep_base.info

      - name: Capture Coverage
        run: |
          cd trustcore-test
          lcov --no-external --capture --directory . --output-file /tmp/scep_test.info
          lcov --ignore-errors inconsistent --add-tracefile /tmp/scep_base.info --add-tracefile /tmp/scep_test.info --output-file /tmp/scep_total.info

      - name: Print Coverage Summary
        run: |
          cd trustcore-test
          echo "Coverage Summary:"
          lcov --list /tmp/scep_total.info | tee coverage_summary.log

      - name: Upload Coverage Summary Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: scep_unittest_coverage_summary
          path: trustcore-test/coverage_summary.log
          
      - name: Get Slack User ID
        if: always()
        id: slack_map
        run: |
          GITHUB_USER="${{ github.actor }}"
          SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
          
          SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
          
          echo "GitHub User: $GITHUB_USER"
          echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT

      - name: Send Slack notification (Failure)
        if: always() && (failure() || cancelled())
        run: |
          SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
          if [ -n "$SLACK_USER_ID" ]; then
            MENTION="<@$SLACK_USER_ID>"
          else
            MENTION="${GITHUB_ACTOR}"
          fi
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            MESSAGE="SCEP Unittest failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            MESSAGE="SCEP Unittest failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi  
          curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
