          fi

      - name: Final Coverage Summary
        run: |
          if [ ! -f coverage_totals.txt ]; then
            echo "No coverage data found"
            exit 0
          fi

          echo "================ FINAL COVERAGE SUMMARY ================"
          printf "\n"

          # Header
          printf "%-30s | %-18s | %-18s | %-12s\n" "Unit Test" "Lines" "Functions" "Branches"
          printf "%-30s-+-%-18s-+-%-18s-+-%-12s\n" "------------------------------" "------------------" "------------------" "------------"

          while IFS="|" read -r NAME DATA; do
            # Split DATA into columns
            LINES=$(echo "$DATA" | awk -F'|' '{print $1}')
            FUNCS=$(echo "$DATA" | awk -F'|' '{print $2}')
            BRANCH=$(echo "$DATA" | awk -F'|' '{print $3}')
            printf "%-30s | %-18s | %-18s | %-12s\n" "$NAME" "$LINES" "$FUNCS" "$BRANCH"
          done < coverage_totals.txt

          printf "\n=======================================================\n"
       
