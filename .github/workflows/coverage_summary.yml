name: "Coverage Summary"

permissions:
  contents: read

on:
  workflow_dispatch: {} 
  schedule:
    - cron: '0 2 * * *' # Optional daily at 2 AM UTC

jobs:
  fetch-coverage:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh

      - name: Authenticate GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.MY_SECRET_TOKEN }}"

      - name: Fetch Coverage for Common Unit Tests
        run: |
          WF="common_unittest.yml"
          RUN_ID=$(gh run list --workflow="$WF" --limit 20 --json databaseId,headBranch,status --jq '.[] | select(.headBranch=="main") | .databaseId' | head -n 1)
          if [ -z "$RUN_ID" ]; then
            echo "No runs found for workflow '$WF' on branch coverage_info_trial"
          fi
          echo "Run ID: $RUN_ID"
          if gh run download "$RUN_ID" --name "${WF%.yml}_coverage_summary" --dir "./coverage_logs_${WF%.yml}"; then
            LOG_FILE="./coverage_logs_${WF%.yml}/coverage_summary.log"
            cat "$LOG_FILE"
            TOTAL_LINE=$(grep "Total:" "$LOG_FILE")
            if [ -n "$TOTAL_LINE" ]; then
              TOTAL_DATA=$(echo "$TOTAL_LINE" | sed 's/.*Total:|//')
              echo "Common Unit Test|$TOTAL_DATA" >> coverage_totals.txt
            fi
          else
            echo "Artifact '${WF%.yml}_coverage_summary' not found for run $RUN_ID"
          fi

