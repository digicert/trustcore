name: "Unit Test CryptoInterface Extended"

on:
  workflow_dispatch: {}

  schedule:
    - cron: '30 7 * * 1'   # Monday 1:00 PM IST
    - cron: '30 7 * * 3'   # Wednesday 1:00 PM IST

jobs:
  unittest-cryptointerface-extended:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout current repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y cproto
        sudo apt install -y ruby
        sudo apt install -y build-essential
        sudo apt install -y cmake
        sudo apt install -y python3 python3-pip

    # ------------------------------------------------------------------
    # Clone & prepare mocn-qa-m-products
    # ------------------------------------------------------------------
    - name: Checkout mocn-qa-m-products
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        repository: digicert/mocn-qa-m-products
        token: ${{ secrets.MY_SECRET_TOKEN }}
        path: mocn-qa-m-products
        persist-credentials: false
        fetch-depth: 1

    # ------------------------------------------------------------------
    # Copy script and run check
    # ------------------------------------------------------------------
    - name: Copy Jenkins check script
      run: |
        cp mocn-qa-m-products/qa_utils/check_jenkins_build_script_result/run_check_script.py .

    - name: Running Unittest CryptoInterface Extended
      run: |
        PYTHONUNBUFFERED=1 python run_check_script.py "projects/cryptointerface_unittest" "build_and_run_all.sh"
        
    - name: Get Slack User ID
      if: always()
      id: slack_map
      run: |
        GITHUB_USER="${{ github.actor }}"
        SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
        
        SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
        
        echo "GitHub User: $GITHUB_USER"
        echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT

    - name: Send Slack notification (Failure)
      if: always() && (failure() || cancelled())
      run: |
        SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
        if [ -n "$SLACK_USER_ID" ]; then
          MENTION="<@$SLACK_USER_ID>"
        else
          MENTION="${GITHUB_ACTOR}"
        fi
        if [ "$GITHUB_REF_NAME" = "main" ]; then
          MESSAGE="Unittest CryptoInterface Extended Test failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        else
          MESSAGE="Unittest CryptoInterface Extended Test failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        fi  
        curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
