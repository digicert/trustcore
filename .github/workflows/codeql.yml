name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 13 * * *'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }}, ${{ matrix.feature }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
            feature: ENABLE_TPM2
          - language: c-cpp
            build-mode: manual
            feature: ENABLE_PKCS11_SOFTHSM
          - language: c-cpp
            build-mode: manual
            feature: ENABLE_NANOROOT
          - language: python
            build-mode: none
            feature: none
          - language: c-cpp
            build-mode: manual
            feature: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install SoftHSM2 (for PKCS11 build)
      if: matrix.feature == 'ENABLE_PKCS11_SOFTHSM'
      run: |
        sudo apt-get update
        sudo apt-get install -y softhsm2
        # Find and copy the shared library to ./lib/
        find /usr/lib /usr/lib64 /usr/local/lib -name 'libsofthsm2.so*' -exec cp {} ./lib/ \;

    - name: Clean build directories
      if: matrix.language == 'c-cpp'
      run: |
        rm -rf build
        find projects -type d -name build -exec rm -rf {} +

    - name: Initialize CodeQL
      uses: github/codeql-action/init@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: CMake
      if: matrix.language == 'c-cpp'
      run: |
        cmake \
          -DWITH_LOGGING=ON \
          -DBUILD_SAMPLES=ON \
          -DENABLE_MQTT_CLIENT=ON \
          -DENABLE_MQTT_STREAMING=ON \
          -DENABLE_SSH_CLIENT=ON \
          -DENABLE_SSH_SERVER=ON \
          -DENABLE_SSH_CLIENT_CERT_AUTH=ON \
          -DENABLE_SSH_SERVER_CERT_AUTH=ON \
          -DENABLE_TAP_API_EXAMPLE=ON \
          -DENABLE_EST=ON \
          -DENABLE_SCEP=ON \
          -DSECURE_PATH="$(pwd)" \
          -D${{ matrix.feature }}=ON \
          -B build -S . && \
        cmake --build build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2
      with:
        category: "/language:${{matrix.language}}/${{matrix.feature}}"
      
    - name: Get Slack User ID
      if: always()
      id: slack_map
      run: |
        GITHUB_USER="${{ github.actor }}"
        SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
        
        SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
        
        echo "GitHub User: $GITHUB_USER"
        echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT

    - name: Send Slack notification (Failure)
      if: always() && (failure() || cancelled())
      run: |
        SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
        if [ -n "$SLACK_USER_ID" ]; then
          MENTION="<@$SLACK_USER_ID>"
        else
          MENTION="${GITHUB_ACTOR}"
        fi
        if [ "$GITHUB_REF_NAME" = "main" ]; then
          MESSAGE="CodeQL Test failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        else
          MESSAGE="CodeQL Test failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        fi  
        curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
