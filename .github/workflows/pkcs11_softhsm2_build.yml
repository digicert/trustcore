name: PKCS11 SoftHSM2 Build

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - projects/smp_pkcs11/**
      - src/smp/smp_pkcs11/**

permissions:
  contents: read

jobs:
  BuildPKCS11SoftHSM2:
    runs-on: [ubuntu-22.04]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: trustcore-test

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get -y install cmake softhsm2 libsofthsm2

      - name: CMake
        run: |
          cd trustcore-test
          cp /usr/lib/softhsm/libsofthsm2.so ./lib/ 
          cmake \
            -DWITH_LOGGING=ON \
            -DBUILD_SAMPLES=ON \
            -DENABLE_MQTT_CLIENT=ON \
            -DENABLE_MQTT_STREAMING_SUPPORT=ON \
            -DENABLE_SSH_CLIENT=ON \
            -DENABLE_SSH_SERVER=ON \
            -DENABLE_SSH_CLIENT_CERT_AUTH=ON \
            -DENABLE_SSH_SERVER_CERT_AUTH=ON \
            -DENABLE_TAP_API_EXAMPLE=ON \
            -DENABLE_PKCS11_SOFTHSM2=ON \
            -DENABLE_SCEP=ON \
            -DENABLE_EST=ON \
            -DENABLE_TAP=ON \
            -DSECURE_PATH="$(pwd)" \
            -B build -S . && \
          cmake --build build
          
      - name: Get Slack User ID
        if: always()
        id: slack_map
        run: |
          GITHUB_USER="${{ github.actor }}"
          SLACK_USER_MAP='${{ vars.SLACK_USER_MAP_JSON }}'
          
          SLACK_USER_ID=$(echo "$SLACK_USER_MAP" | jq -r --arg user "$GITHUB_USER" '.[$user] // ""')
          
          echo "GitHub User: $GITHUB_USER"
          echo "slack_user_id=$SLACK_USER_ID" >> $GITHUB_OUTPUT

      - name: Send Slack notification (Failure)
        if: always() && (failure() || cancelled())
        run: |
          SLACK_USER_ID="${{ steps.slack_map.outputs.slack_user_id }}"
          if [ -n "$SLACK_USER_ID" ]; then
            MENTION="<@$SLACK_USER_ID>"
          else
            MENTION="${GITHUB_ACTOR}"
          fi
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            MESSAGE="PKCS11 SoftHSM2 Build failed on branch \`${GITHUB_REF_NAME}\`\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            MESSAGE="PKCS11 SoftHSM2 Build failed on branch \`${GITHUB_REF_NAME}\`\nTriggered by: ${MENTION}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi  
          curl -X POST -H 'Content-type: application/json' --data "{\"text\": \"${MESSAGE}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
